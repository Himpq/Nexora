<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexoraCode</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- KaTeX 离线（需要 assets/katex/ 目录） -->
  <link rel="stylesheet" href="assets/katex/katex.min.css" />
  <script defer src="assets/katex/katex.min.js"></script>
  <script defer src="assets/katex/contrib/auto-render.min.js"></script>

  <!-- marked.js 离线 -->
  <script src="assets/marked.min.js"></script>

  <!-- highlight.js 代码高亮（离线） -->
  <link rel="stylesheet" href="assets/highlight/github.min.css" />
  <script src="assets/highlight/highlight.min.js"></script>

  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div class="app-container">

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">NexoraCode<span class="logo-dot"></span></div>
        <span id="connection-status" class="status-dot disconnected" title="未连接 Nexora"></span>
      </div>

      <div class="sidebar-action">
        <button id="btn-new-chat" class="btn-primary-outline">
          <span>+</span> New Chat
        </button>
      </div>

      <div class="sidebar-content" id="conversation-list"></div>

      <div class="sidebar-footer">
        <button class="btn-icon-footer" id="btn-settings" title="设置">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
          <span>设置</span>
        </button>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Header -->
      <header class="chat-header">
        <div class="header-left">
          <span id="conversation-title" class="header-title">NexoraCode</span>
        </div>
        <div class="header-right">
          <!-- 工具状态指示 -->
          <div id="tool-status-bar" class="tool-status hidden">
            <span class="tool-spinner"></span>
            <span id="tool-status-text"></span>
          </div>
        </div>
      </header>

      <!-- Messages -->
      <div id="messages" class="messages-area" role="log" aria-live="polite">
        <div class="welcome-screen">
          <h1>NexoraCode.</h1>
          <p>本地工具已就绪，开始对话吧。</p>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-wrapper">
        <div class="input-container">
          <textarea
            id="input"
            class="chat-input"
            placeholder="输入消息… (Shift+Enter 换行，Enter 发送)"
            rows="1"
            spellcheck="false"
          ></textarea>
          <button id="btn-send" class="btn-send" title="发送">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
      </div>
    </main>

  </div>

  <!-- 设置面板（overlay） -->
  <div id="settings-overlay" class="modal-overlay hidden">
    <div class="modal-panel">
      <div class="modal-header">
        <h2>设置</h2>
        <button class="modal-close" id="btn-close-settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="modal-body">
        <label class="form-label">Nexora 服务器地址
          <input type="text" class="form-input" id="cfg-nexora-url" placeholder="http://localhost:5000" />
        </label>
        <label class="form-label">允许操作的目录（每行一个）
          <textarea class="form-input" id="cfg-allowed-dirs" rows="4" placeholder="C:\Users\you\Documents"></textarea>
        </label>
        <label class="form-label">Shell 白名单命令前缀（每行一个，留空=全部需确认）
          <textarea class="form-input" id="cfg-shell-whitelist" rows="3" placeholder="git
python
npm"></textarea>
        </label>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-close-settings-2">取消</button>
        <button class="btn-primary" id="btn-save-settings">保存</button>
      </div>
    </div>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
