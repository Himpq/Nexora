<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - 公开展示</title>
    <link rel="stylesheet" href="/static/vendor/fonts/fonts.css">
    <link rel="stylesheet" href="/static/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/static/vendor/katex/katex.min.css">
    <link rel="stylesheet" href="/static/vendor/highlightjs/styles/github.min.css">
    <script src="/static/vendor/marked/marked.min.js"></script>
    <script src="/static/vendor/katex/katex.min.js"></script>
    <script src="/static/vendor/katex/contrib/auto-render.min.js"></script>
    <script src="/static/vendor/highlightjs/highlight.min.js"></script>
    <script src="/static/js/secure_render.js"></script>
    <style>
        :root {
            --bg: #fdfdfd; --surface: #ffffff; --text: #1e293b; 
            --text-muted: #64748b; --border: #e2e8f0; --primary: #3b82f6;
        }
        body { 
            font-family: var(--nc-font-sans); background: var(--bg); color: var(--text);
            margin: 0; padding: 40px 20px; display: flex; justify-content: center;
        }
        .container { width: 100%; max-width: 850px; }
        .header { margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header h1 { margin: 0; font-size: 32px; font-weight: 600; color: #000; }
        .meta { font-size: 14px; color: var(--text-muted); margin-top: 8px; }
        .content { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px; 
            padding: 40px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
            line-height: 1.8; font-size: 16px; min-height: 600px;
        }
        /* Markdown Styling */
        .content h1, .content h2, .content h3 { border-bottom: 1px solid #eee; padding-bottom: 8px; margin-top: 24px; }
        .content pre { background: #f6f8fa; padding: 16px; border-radius: 8px; overflow-x: auto; }
        .content code { font-family: var(--nc-font-mono); background: #f1f5f9; padding: 2px 4px; border-radius: 4px; font-size: 0.9em; }
        .content blockquote { border-left: 4px solid var(--primary); padding-left: 16px; color: var(--text-muted); font-style: italic; margin: 20px 0; }
        .content img { max-width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{ title | e }}</h1>
            <div class="meta">由 @{{ username | e }} 分享 · 只读模式</div>
        </div>
        <article class="content" id="content">
            <!-- Rendered Markdown -->
        </article>
    </div>

    <script type="application/json" id="rawContentJson">{{ content | tojson }}</script>
    <script>
        const rawContent = JSON.parse(document.getElementById('rawContentJson').textContent || '""');
        const contentEl = document.getElementById('content');

        function enforceLinksOpenInNewTab(root) {
            if (!root || typeof root.querySelectorAll !== 'function') return;
            root.querySelectorAll('a[href]').forEach((a) => {
                a.setAttribute('target', '_blank');
                a.setAttribute('rel', 'noopener noreferrer');
            });
        }
        
        // Setup marked with highlight
        if (window.marked && window.hljs) {
            marked.setOptions({
                highlight: (code, lang) => {
                    if (lang && hljs.getLanguage(lang)) {
                        return hljs.highlight(code, { language: lang }).value;
                    }
                    return hljs.highlightAuto(code).value;
                }
            });
        }

        contentEl.innerHTML = window.NexoraSecureRender
            ? window.NexoraSecureRender.safeMarkdownToHtml(rawContent)
            : marked.parse(rawContent);
        enforceLinksOpenInNewTab(contentEl);

        // Code highlighting
        if (window.hljs) {
            hljs.highlightAll();
        }
        
        // Render Math
        renderMathInElement(contentEl, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\(', right: '\\)', display: false},
                {left: '\\[', right: '\\]', display: true}
            ],
            throwOnError : false
        });
    </script>
</body>
</html>
