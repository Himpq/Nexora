<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexoraDB Admin</title>
  <style>
    :root {
      --bg-left: #000000;
      --bg-right: #0b0b0b;
      --panel: #111111;
      --panel-soft: #151515;
      --ink: #f5f5f5;
      --muted: #9ca3af;
      --line: #1f2937;
      --accent: #ffffff;
      --hover: #1f1f1f;
      --chip: #0f0f0f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg-right);
      color: var(--ink);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: 100vh;
    }
    aside {
      background: #000;
      border-right: 1px solid #111;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px;
    }
    .brand-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.5px;
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .brand-title .dot { color: #444; }
    .brand-title .dot::after {
      content: ".";
      animation: multiPhaseDots 4.5s infinite;
      display: inline-block;
    }
    @keyframes multiPhaseDots {
      0%   { content: "."; opacity: 1; }
      10%  { content: "."; opacity: 0.3; }
      20%  { content: ".."; opacity: 1; }
      40%  { content: "..."; opacity: 1; }
      60%  { content: "..."; opacity: 0.7; }
      80%  { content: ".."; opacity: 1; }
      100% { content: "."; opacity: 1; }
    }
    .nav {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .nav button {
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      background: transparent;
      color: var(--muted);
      border: 1px solid transparent;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav button.active,
    .nav button:hover {
      color: #fff;
      background: #101010;
      border-color: #1c1c1c;
    }
    .nav .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #6b7280;
      padding: 6px 10px;
      margin-top: 6px;
    }
    .main {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 26px;
      border-bottom: 1px solid #161616;
      background: #0f0f0f;
    }
    header .title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .btn {
      padding: 10px 14px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-outline {
      background: transparent;
      color: #fff;
      border: 1px solid #333;
    }
    .wrap { padding: 22px 26px 40px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--panel);
      border: 1px solid #1b1b1b;
      border-radius: 6px;
      padding: 16px;
    }
    .card h3 {
      margin: 0 0 10px 0;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
      font-weight: 700;
    }
    .card .value {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
    }
    .muted { color: var(--muted); }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 18px 0 12px;
    }
    .section-title h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border: 1px solid #1f1f1f;
      border-radius: 999px;
      font-size: 12px;
      background: #0d0d0d;
      color: #cbd5f5;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .table th, .table td {
      text-align: left;
      padding: 12px 8px;
      border-bottom: 1px solid #1c1c1c;
      vertical-align: middle;
    }
    .table th {
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.12em;
    }
    .key { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; font-size: 12px; }
    .row { display: flex; align-items: center; gap: 10px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #16a34a; display: inline-block; margin-right: 8px;
      box-shadow: 0 0 0 4px rgba(22,163,74,0.15);
    }

    #projectModal {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); align-items:center; justify-content:center; z-index: 50;
    }
    .modal {
      width: 540px; max-width: calc(100% - 32px);
      background: #0f0f0f; border: 1px solid #232323; border-radius: 8px; padding: 20px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.45);
    }
    .modal h3 { margin: 0 0 14px 0; }
    .field { margin-bottom: 12px; }
    .field label {
      display:block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--muted); margin-bottom: 8px; font-weight: 700;
    }
    .input {
      width: 100%; padding: 12px 14px; border: 1px solid #1f1f1f; border-radius: 4px; font-size: 14px; background: #0b0b0b; color: #fff;
    }
    .input:focus {
      outline: none;
      border-color: #fff;
      background: #000;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
    }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 12px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    @media (max-width: 1100px) {
      .layout { grid-template-columns: 180px 1fr; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 680px) {
      .layout { grid-template-columns: 1fr; }
      aside { flex-direction: row; overflow-x: auto; }
      header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <div class="brand">
        <div class="brand-title">NexoraDB<span class="dot"></span></div>
      </div>
      <div class="nav">
        <div class="section-label">Menu</div>
        <button class="active" onclick="switchTab('status')">状态</button>
        <button onclick="switchTab('projects')">项目</button>
        <button onclick="switchTab('settings')">设置</button>
      </div>
    </aside>

    <div class="main">
      <header>
        <div class="title" id="pageTitle">状态</div>
        <div class="row">
          <button class="btn" onclick="openProjectModal()">新建项目</button>
          <button class="btn btn-outline" onclick="logout()">退出登录</button>
        </div>
      </header>

      <div class="wrap">
        <div id="tab-status" class="tab-panel active">
          <div class="grid">
            <div class="card">
              <h3>Service Status</h3>
              <div class="row"><span class="status-dot"></span><div class="value" id="serviceStatus">Online</div></div>
              <div class="muted" id="uptimeText" style="margin-top:6px; font-size:12px;"></div>
            </div>
            <div class="card">
              <h3>Total Storage</h3>
              <div class="value" id="totalStorage">-</div>
              <div class="muted" style="margin-top:6px; font-size:12px;">All project data</div>
            </div>
            <div class="card">
              <h3>Total Vectors</h3>
              <div class="value" id="totalVectors">-</div>
              <div class="muted" style="margin-top:6px; font-size:12px;">Across all collections</div>
            </div>
            <div class="card">
              <h3>Embedding Model</h3>
              <div class="value" id="embeddingModel" style="font-size:14px; line-height:1.4;">-</div>
              <div class="muted" style="margin-top:6px; font-size:12px;">Active backend model</div>
            </div>
          </div>
        </div>

        <div id="tab-projects" class="tab-panel">
          <div class="section-title">
            <h2>Projects</h2>
            <div class="pill" id="projectCount">0 projects</div>
          </div>

          <div class="card">
            <table class="table">
              <thead>
                <tr>
                  <th>Project</th>
                  <th>Data Path</th>
                  <th>Storage</th>
                  <th>Vectors</th>
                  <th>API Key</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="projectTable"></tbody>
            </table>
          </div>
        </div>

        <div id="tab-settings" class="tab-panel">
          <div class="card">
            <h3>Settings</h3>
            <div class="muted" style="font-size:12px; line-height:1.6;">
              当前设置存放在 config.json。你可以通过项目管理生成不同 API Key 并隔离数据目录。
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="projectModal">
    <div class="modal">
      <div class="row" style="justify-content: space-between; margin-bottom: 12px;">
        <h3>新建项目</h3>
        <button class="btn btn-outline" onclick="closeProjectModal()">关闭</button>
      </div>
      <div class="field">
        <label for="projectName">项目名称</label>
        <input id="projectName" class="input" placeholder="例如: notes-team" />
      </div>
      <div class="field">
        <label for="projectPath">数据路径（可选）</label>
        <input id="projectPath" class="input" placeholder="默认: ./chroma_data/{project}" />
      </div>
      <div class="field">
        <label for="projectKey">API Key（可选）</label>
        <input id="projectKey" class="input" placeholder="留空将自动生成" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeProjectModal()">取消</button>
        <button class="btn" onclick="addProject()">创建</button>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      const titles = { status: '状态', projects: '项目', settings: '设置' };
      document.getElementById('pageTitle').textContent = titles[tab] || '状态';
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
      const idx = tab === 'status' ? 0 : tab === 'projects' ? 1 : 2;
      document.querySelectorAll('.nav button')[idx].classList.add('active');
    }

    function openProjectModal(){ document.getElementById('projectModal').style.display='flex'; }
    function closeProjectModal(){ document.getElementById('projectModal').style.display='none'; }

    function formatUptime(sec){
      const d = Math.floor(sec / 86400);
      const h = Math.floor((sec % 86400) / 3600);
      const m = Math.floor((sec % 3600) / 60);
      if (d > 0) return `${d}d ${h}h`;
      if (h > 0) return `${h}h ${m}m`;
      return `${m}m`;
    }

    async function loadStatus(){
      const res = await fetch('/admin/api/status');
      const data = await res.json();
      if (!data.success) return [];
      document.getElementById('totalStorage').textContent = data.total_human || '-';
      document.getElementById('totalVectors').textContent = (data.total_vectors ?? '-');
      document.getElementById('embeddingModel').textContent = data.embedding_model || '-';
      document.getElementById('uptimeText').textContent = `Uptime: ${formatUptime(data.uptime_sec || 0)}`;
      return data.projects || [];
    }

    async function loadProjects(){
      const [projectsData, statusProjects] = await Promise.all([
        fetch('/admin/api/projects').then(r => r.json()),
        loadStatus()
      ]);

      const table = document.getElementById('projectTable');
      table.innerHTML='';
      if (!projectsData.success) return;
      const projects = projectsData.projects || {};
      const statusMap = {};
      (statusProjects || []).forEach(p => { statusMap[p.name] = p; });

      const names = Object.keys(projects);
      document.getElementById('projectCount').textContent = `${names.length} projects`;

      names.forEach(name => {
        const p = projects[name];
        const s = statusMap[name] || {};
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${name}</td>
          <td class="muted">${p.data_path || ''}</td>
          <td>${s.size_human || '-'}</td>
          <td>${s.vector_count ?? '-'}</td>
          <td class="key">${p.api_key || ''}</td>
          <td><button class="btn btn-outline" onclick="removeProject('${name}')">删除</button></td>
        `;
        table.appendChild(tr);
      });
    }

    async function addProject(){
      const name = document.getElementById('projectName').value.trim();
      const data_path = document.getElementById('projectPath').value.trim();
      const api_key = document.getElementById('projectKey').value.trim();
      if (!name) return;
      await fetch('/admin/api/projects', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name, data_path, api_key })
      });
      document.getElementById('projectName').value='';
      document.getElementById('projectPath').value='';
      document.getElementById('projectKey').value='';
      closeProjectModal();
      loadProjects();
    }

    async function removeProject(name){
      const ok = confirm(`确认删除项目 ${name} ?`);
      if (!ok) return;
      await fetch(`/admin/api/projects/${name}`, { method:'DELETE' });
      loadProjects();
    }

    async function logout(){
      await fetch('/admin/logout', { method:'POST' });
      location.href = '/admin/login';
    }

    loadProjects();
  </script>
</body>
</html>
